name: تحديث بيانات قطاع البنوك السعودية

on:
  schedule:
    # السوق السعودي أثناء التداول المستمر: كل 30 دقيقة، 10:00-14:30 بتوقيت الرياض، الأحد-الخميس
    - cron: '0,30 7-11 * * 0-4'
    # السوق السعودي عند وقت الإغلاق ومزاد الإغلاق: كل 5 دقائق، 14:30-16:00 بتوقيت الرياض
    # (لضمان التقاط سعر الإغلاق الرسمي النهائي بعد اكتمال مزاد الإغلاق، مو سعر لحظي قبل انتهاء التداول)
    - cron: '*/5 11-13 * * 0-4'
    # السوق الأمريكي: كل 30 دقيقة، 9:30ص-5:00م تقريبًا بتوقيت شرق أمريكا، الاثنين-الجمعة
    - cron: '30 13-21 * * 1-5'
  workflow_dispatch: {}   # يسمح بتشغيل يدوي فوري من تبويب Actions

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: سحب المستودع
        uses: actions/checkout@v4

      - name: تجهيز بايثون
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: تثبيت المكتبات
        run: pip install -r requirements.txt

      - name: جلب وتحليل البيانات
        run: python scripts/fetch_data.py

      - name: حفظ التحديث ورفعه
        run: |
          git config user.name "tasi-terminal-bot"
          git config user.email "actions@github.com"
          git add data/data.json
          git diff --staged --quiet || git commit -m "تحديث تلقائي للبيانات $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
